<!DOCTYPE html>
<html>
<head>
    <title>Test Egg Inventory API</title>
</head>
<body>

<h2>Test Egg Inventory API</h2>

<button onclick="sendData()">Send Test Data</button>

<pre id="result"></pre>

<script>
function sendData() {
    fetch("http://127.0.0.1:8001/api/egg-inventory", {
        method: "POST",
        headers: {
            "Accept": "application/json",
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            batch_code: "BATCH-001",
            egg_size: "Large",
            quantity: 50,
            received_date: "2026-05-17"
        })
    })
    .then(response => response.json())
    .then(data => {
        document.getElementById("result").textContent = JSON.stringify(data, null, 2);
    })
    .catch(error => {
        document.getElementById("result").textContent = error;
    });
}
</script>

</body>
</html>
